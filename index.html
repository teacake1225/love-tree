<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>달팽이 나무 🐌</title>
  <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Asta+Sans&family=Moirai+One&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bark: #8B6340;
      --bark-dark: #6B4820;
      --leaf-main: #5A9A3A;
      --leaf-light: #7DC955;
      --leaf-dark: #3E7A22;
      --ground: #C8A96E;
      --bg: transparent;
      --card: #FFFBF4;
      --text: #3D2B1A;
      --text-muted: #9B7E5C;
      --accent: #E07B39;
      --accent-soft: #F5D9BE;
      --border: rgba(139,99,64,0.2);
      --shadow: rgba(139,99,64,0.12);
    }

    body {
      background: transparent;
      font-family: 'Do Hyeon', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(139,99,64,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(90,154,58,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      text-align: center;
      padding: 2rem 1rem 0.5rem;
      z-index: 1;
    }

    header h1 {
      font-family: 'Moirai One', cursive;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: #4D4037;
      letter-spacing: 0.02em;
    }

header p {
  font-size: 0.88rem;
  color: #4D4037;
  margin-top: 4px;
  font-family: 'Asta Sans', sans-serif;
}

    #tree-wrapper {
      position: relative;
      width: min(700px, 98vw);
      z-index: 1;
    }

    #tree-svg {
      display: block;
      width: 100%;
    }

    #snails-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .snail-wrap {
      position: absolute;
      pointer-events: all;
      cursor: pointer;
      transform-origin: center bottom;
      animation: hang 3s ease-in-out infinite;
      transition: filter 0.2s;
    }

    .snail-wrap:hover {
      filter: drop-shadow(0 2px 6px rgba(139,99,64,0.5));
      animation-play-state: paused;
      transform: scale(1.18);
    }

    @keyframes hang {
      0%,100% { transform: rotate(-6deg); }
      50%      { transform: rotate(6deg); }
    }

    .snail-wrap.leaving {
      animation: popLeave 0.5s ease-in forwards !important;
    }

    @keyframes popLeave {
      0%   { opacity:1; transform: scale(1); }
      50%  { opacity:1; transform: scale(1.4) rotate(15deg); }
      100% { opacity:0; transform: scale(0) rotate(30deg); }
    }

    /* Bubble */
    .bubble {
      position: absolute;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px 13px;
      font-size: 0.82rem;
      line-height: 1.5;
      max-width: 160px;
      text-align: center;
      color: var(--text);
      pointer-events: none;
      z-index: 20;
      box-shadow: 0 4px 16px var(--shadow);
      animation: bubblePop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .bubble::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid var(--card);
    }

    .bubble::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid var(--border);
    }

    .bubble.fade-out {
      animation: bubbleFade 0.4s ease forwards;
    }

    @keyframes bubblePop {
      from { opacity:0; transform: scale(0.7) translateY(6px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    @keyframes bubbleFade {
      from { opacity:1; }
      to   { opacity:0; }
    }

    /* Input */
    #input-area {
      display: flex;
      gap: 8px;
      width: min(640px, 94vw);
      margin: 0.5rem auto 0.4rem;
      z-index: 1;
    }

    #msg-input {
      flex: 1;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      font-family: 'Do Hyeon', sans-serif;
      font-size: 0.9rem;
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-muted); }

    #add-btn {
      padding: 11px 20px;
      background: #003049;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Asta Sans', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }

    background: #001f30;
    #add-btn:active { transform: scale(0.96); }

    #hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
      z-index: 1;
    }

    #empty-hint {
      position: absolute;
bottom: 4%;
right: 5%;
transform: none;
      font-family: 'Asta Sans', sans-serif;
      font-size: 1rem;
      color: var(--text-muted);
      text-align: center;
      pointer-events: none;
      line-height: 1.8;
    }

    #counter {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: -0.3rem;
      margin-bottom: 0.6rem;
      z-index: 1;
    }
  </style>
</head>
<body>

<header>
  <h1>🌳 달팽이 나무</h1>
  <p>글을 남기면 달팽이가 나무에 열림<br>달팽이를 클릭하면 메시지가 보임!</p>
</header>

<div id="tree-wrapper">
  <svg id="tree-svg" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
    <!-- ground -->
    <ellipse cx="340" cy="490" rx="120" ry="14" fill="#C8A96E" opacity="0.35"/>

    <!--  -->
    <path d="M300 490 C298 460 295 435 298 410 C301 385 296 365 300 345 C304 325 308 305 315 288" stroke="#5e3023" stroke-width="52" fill="none" stroke-linecap="round"/>

    <!-- leaves -->
    <ellipse cx="340" cy="195" rx="160" ry="150" fill="#4A7652"/>
    <ellipse cx="210" cy="240" rx="95"  ry="85"  fill="#4A7652"/>
    <ellipse cx="470" cy="240" rx="95"  ry="85"  fill="#4A7652"/>
    <ellipse cx="340" cy="175" rx="145" ry="135" fill="#5c9468"/>
    <ellipse cx="340" cy="155" rx="115" ry="108" fill="#5c9468"/>
  </svg>

  <div id="snails-layer">
    <div id="empty-hint">아직 달팽이가 없어요 🐌<br>아래에서 메시지를 남겨보세요</div>
  </div>
</div>

<div id="input-area">
  <input id="msg-input" type="text" placeholder="글을 남겨 보세요" maxlength="50"/>
  <button id="add-btn" onclick="addSnail()">전송</button>
</div>
<div id="counter"></div>
<div id="hint" style="font-size: 0.88rem;">달팽이를 클릭하면 메시지를 볼 수 있고 곧 달팽이는 사라져요</div>

<script>
  /* ── 달팽이가 앉을 수 있는 나뭇가지 위치 (viewBox 680×520 기준 %) ── */
const SPOTS = [
    [.340,.180],[.300,.165],[.380,.165],[.260,.200],[.420,.200],
    [.320,.148],[.360,.148],[.280,.182],[.400,.182],[.340,.135],
    [.310,.155],[.370,.155],[.250,.218],[.430,.218],[.290,.168],
    [.350,.168],[.330,.195],[.355,.195],[.275,.155],[.405,.155],
    [.320,.130],[.360,.130],[.340,.210],[.300,.210],[.380,.210],
    [.265,.175],[.415,.175],[.340,.155],[.310,.138],[.370,.138],
  ];

  let usedSpots = new Set();
  let snailCount = 0;

  function pickSpot() {
    const avail = SPOTS.map((s,i)=>i).filter(i=>!usedSpots.has(i));
    if (!avail.length) return null;
    return avail[Math.floor(Math.random()*avail.length)];
  }

  function snailSVG() {
    const palette = [
      {shell:'#D4845A', stripe:'#B8623A', body:'#C8B87A'},
      {shell:'#C97B52', stripe:'#A0522D', body:'#B8A86A'},
      {shell:'#B8623A', stripe:'#8B4513', body:'#A89858'},
      {shell:'#E8A87C', stripe:'#C97B52', body:'#D4C490'},
      {shell:'#A06030', stripe:'#7A4020', body:'#B0A060'},
    ];
    const c = palette[Math.floor(Math.random()*palette.length)];
    return `<svg width="44" height="38" viewBox="0 0 44 38" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="14" cy="29" rx="14" ry="7" fill="${c.body}"/>
      <path d="M3 29 Q1 24 5 21 Q10 18 16 21 Q21 24 26 29" fill="${c.body}"/>
      <circle cx="26" cy="17" r="13" fill="${c.shell}" stroke="${c.stripe}" stroke-width="1.2"/>
      <path d="M26 17 Q30 12 34 17 Q30 22 26 17" fill="${c.stripe}" opacity="0.5"/>
      <path d="M26 17 Q22 12 18 17 Q22 22 26 17" fill="${c.stripe}" opacity="0.4"/>
      <circle cx="26" cy="17" r="5" fill="${c.shell}" stroke="${c.stripe}" stroke-width="0.8" opacity="0.7"/>
      <circle cx="26" cy="17" r="2" fill="${c.stripe}" opacity="0.5"/>
      <line x1="8" y1="20" x2="5" y2="12" stroke="${c.body}" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="13" y1="19" x2="11" y2="11" stroke="${c.body}" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="5"  cy="11" r="1.8" fill="#3D2B1A"/>
      <circle cx="11" cy="10" r="1.8" fill="#3D2B1A"/>
      <circle cx="5.6"  cy="10.4" r="0.6" fill="#fff" opacity="0.7"/>
      <circle cx="11.6" cy="9.4"  r="0.6" fill="#fff" opacity="0.7"/>
    </svg>`;
  }

  function addSnail() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    const si = pickSpot();
    if (si === null) {
      alert('나무가 꽉 찼어요! 달팽이를 클릭해서 자리를 만들어주세요 🐌');
      return;
    }

    usedSpots.add(si);
    const [px, py] = SPOTS[si];

    const svg = document.getElementById('tree-svg');
    const svgR = svg.getBoundingClientRect();
    const layerR = document.getElementById('snails-layer').getBoundingClientRect();

    const x = svgR.left - layerR.left + px * svgR.width;
    const y = svgR.top  - layerR.top  + py * svgR.height;

    const wrap = document.createElement('div');
    wrap.className = 'snail-wrap';
    wrap.style.left = (x - 22) + 'px';
    wrap.style.top  = (y - 19) + 'px';
    wrap.style.animationDelay = (Math.random()*2.5).toFixed(2)+'s';
    wrap.style.animationDuration = (2.5 + Math.random()*2).toFixed(2)+'s';
    wrap.innerHTML = snailSVG();
    wrap.title = '클릭하면 메시지를 볼 수 있어요';

    wrap.addEventListener('click', () => openSnail(wrap, text, si));

    document.getElementById('snails-layer').appendChild(wrap);
    document.getElementById('empty-hint').style.display = 'none';

    wrap.style.opacity = '0';
    wrap.style.transition = 'opacity 0.4s';
    requestAnimationFrame(()=>{ wrap.style.opacity='1'; });

    snailCount++;
    updateCounter();
    input.value = '';
    input.focus();
  }

  function openSnail(wrap, text, si) {
    wrap.removeEventListener('click', ()=>{});
    wrap.onclick = null;

    /* bubble */
    const layer = document.getElementById('snails-layer');
    const wR = wrap.getBoundingClientRect();
    const lR = layer.getBoundingClientRect();

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

let bx = wR.left - lR.left + 22 - 80;
    let by = wR.top  - lR.top  - 10;
    if (bx < 4) bx = 4;
    if (bx + 164 > lR.width - 4) bx = lR.width - 168;
    if (by < 4) by = 4;
    bubble.style.left = bx + 'px';
    bubble.style.top  = by + 'px';
    layer.appendChild(bubble);

    /* remove snail */
    wrap.classList.add('leaving');
    usedSpots.delete(si);
    snailCount = Math.max(0, snailCount - 1);
    updateCounter();

    setTimeout(()=>{ wrap.remove(); }, 520);
    setTimeout(()=>{ bubble.classList.add('fade-out'); }, 2200);
    setTimeout(()=>{ bubble.remove(); }, 2600);

    const remaining = document.querySelectorAll('.snail-wrap').length - 1;
    if (remaining <= 0) {
      setTimeout(()=>{
        document.getElementById('empty-hint').style.display = '';
      }, 600);
    }
  }

  function updateCounter() {
    const el = document.getElementById('counter');
    el.textContent = snailCount > 0 ? `🐌 나무에 달팽이 ${snailCount}마리` : '';
  }

  document.getElementById('msg-input').addEventListener('keydown', e=>{
    if (e.key==='Enter') addSnail();
  });
</script>
</body>
</html>
